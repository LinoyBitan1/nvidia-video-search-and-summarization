{{- $rii := (.Values.global | default dict).rtviInternalIngress | default dict }}
{{- if $rii.enabled }}
{{- $cvPath := default "/rtvi-cv" $rii.rtviCvPath }}
{{- $embedPath := default "/rtvi-embed" $rii.rtviEmbedPath }}
{{- $hashHeader := default "x-stream-id" $rii.hashHeader }}
{{- $cvSvc := include "vss.subchartFullname" (dict "Values" .Values "Release" .Release "depKey" "rtvi" "chartName" "vss-rtvi-cv") }}
{{- $embedSvc := include "vss.subchartFullname" (dict "Values" .Values "Release" .Release "depKey" "rtvi" "chartName" "vss-rtvi-embed") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dev-profile-search.fullname" . }}-rtvi-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dev-profile-search.labels" . | nindent 4 }}
    app.kubernetes.io/component: rtvi-internal-ingress
  annotations:
    # Strip the routing prefix before forwarding so rtvi-cv / rtvi-embed
    # see their normal API paths (/api/v1/stream/add etc., not
    # /rtvi-cv/api/v1/stream/add).
    haproxy.org/path-rewrite: |
      {{ $cvPath }}/(.*) /\1
      {{ $cvPath }} /
      {{ $embedPath }}/(.*) /\1
      {{ $embedPath }} /
    # Consistent-hash on the stream-id header. Same x-stream-id key the
    # agent's RTVI-CV / RTVI-Embed clients already emit (see
    # services/agent/src/vss_agents/api/video_ingest.py:313, :365 and
    # rtsp_ingest.py). Inject a uuid() fallback for any request that
    # arrives without the header so they don't all hash to the empty
    # string and pile on one replica.
    haproxy.org/load-balance: {{ printf "hdr(%s)" $hashHeader | quote }}
    haproxy.org/hash-type: "consistent"
    haproxy.org/backend-config-snippet: |
      http-request set-header {{ $hashHeader }} %[uuid()] if !{ req.hdr({{ $hashHeader }}) -m found }
    # Long-running embedding requests can take minutes; raise timeouts
    # past the 60s ingress default.
    haproxy.org/timeout-server: "3600s"
    haproxy.org/timeout-client: "3600s"
    {{- with $rii.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if $rii.className }}
  ingressClassName: {{ $rii.className | quote }}
  {{- end }}
  {{- with $rii.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - {{- if $rii.host }}
      host: {{ $rii.host | quote }}
      {{- end }}
      http:
        paths:
          - path: {{ $cvPath }}
            pathType: Prefix
            backend:
              service:
                name: {{ $cvSvc }}
                port:
                  number: 9000
          - path: {{ $embedPath }}
            pathType: Prefix
            backend:
              service:
                name: {{ $embedSvc }}
                port:
                  number: 8000
{{- end }}
