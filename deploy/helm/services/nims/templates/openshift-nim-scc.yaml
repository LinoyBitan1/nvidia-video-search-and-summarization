{{- if .Values.global.openshift.enabled }}
# Custom SCC for NIM services: seLinuxContext:RunAsAny prevents recursive
# SELinux relabeling timeout on large model PVCs (200Gi+).
{{- $name := default .Chart.Name .Values.nameOverride }}
{{- $fullName := printf "%s-%s" .Release.Name $name | trunc 63 | trimSuffix "-" }}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: {{ $fullName }}-nim
  labels:
    app.kubernetes.io/name: nims
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
priority: 15
allowPrivilegedContainer: false
allowPrivilegeEscalation: true
allowedCapabilities: []
defaultAddCapabilities: []
requiredDropCapabilities:
  - KILL
  - MKNOD
  - SETUID
  - SETGID
fsGroup:
  type: RunAsAny
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
users:
  - system:serviceaccount:{{ .Release.Namespace }}:nim-cache-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-nim-scc
  labels:
    app.kubernetes.io/name: nims
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:{{ $fullName }}-nim
subjects:
  - kind: ServiceAccount
    name: nim-cache-sa
    namespace: {{ .Release.Namespace }}
{{- end }}
