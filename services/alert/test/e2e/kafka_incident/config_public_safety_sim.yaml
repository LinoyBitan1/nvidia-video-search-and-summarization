# Base directory for media used during alert review (optional)
ALERT_REVIEW_MEDIA_BASE_DIR: ""

# VST Configuration - Points to VST simulator
vst_config:
  base_url: "http://127.0.0.1:30888"
  sensor_list_endpoint: "/vst/api/v1/live/streams"
  segment_anchor: "end"
  segment_duration_seconds: 10
  add_overlay: false
  storage:
    base_url: "http://127.0.0.1:30888"
    media_file_path_by_id_endpoint: "/api/v1/storage/file/path"

# General Kafka Configuration - Message Processing
kafka:
  bootstrap_servers: "127.0.0.1:9092"
  group_id: "kafka-incidents-dumper"
  anomalyTopic: "mdx-incidents"
  enhanced_anomaly_topic: "alert-bridge-enhanced-alerts"
  incidents_topic: "alert-bridge-incidents"
  max_poll_records: 1
  auto_offset_reset: "latest"
  enable_auto_commit: false
  max_poll_interval_ms: 300000
  poll_timeout: 500
  message_type: "Incident"
  session_timeout_ms: 10000
  heartbeat_interval_ms: 3000

# VLM Configuration - Points to NIM simulator
vlm:
  base_url: "http://127.0.0.1:18081/v1"
  model: "nvidia/cosmos-reason1-7b"
  max_tokens: 256
  min_pixels: 1568
  max_pixels: 345600
  num_frames: 18
  enable_sampling: false
  sampling_fps: 4

# Event Bridge Configuration
event_bridge:
  sourceType: "kafka"
  sinkType: "kafka"

  kafka_source:
    group_id: "alert-bridge-vlm-group"
    topics:
      incident: "mdx-incidents"
      alert: "mdx-alerts"

  kafka_sink:
    topics:
      enhanced_anomaly: "alert-bridge-enhanced-alerts"
      incidents: "alert-bridge-incidents"

  # Redis Streams Configuration (for when sourceType/sinkType is redisStream)
  redis_source:
    host: "127.0.0.1"
    port: 6379
    db: 0
    dedup_ttl_seconds: 3
    end_time_in_dedup_key_categories: []
    protect_confirmed_verdicts:
      enabled: false
      ttl_seconds: 600
    streams:
      anomaly_stream: "alert-bridge-input-stream"
      heartbeat_stream: "alert-bridge-heartbeats-stream"
    consumer_group: "vlm_agents_group"
    consumer_config:
      block_time: 10
      count: 1
      batch_size: 1

  redis_sink:
    host: "127.0.0.1"
    port: 6379
    db: 0
    streams:
      enhanced_anomaly_stream: "alert-bridge-enhanced-stream"
      incidents_stream: "alert-bridge-incidents-stream"

# Prompt Configuration
prompt:
  prefer_payload_prompt: true
  override_prompts_on_start: false

# Alert Type Configuration - PUBLIC SAFETY BLUEPRINT
alert_type_config_file: "blueprint_config/alert_type_config_public_safety.json"

# Alert Agent Configuration - Processing Settings
alert_agent:
  num_workers: 1
  max_allowed_stream_size: 2
  default_stream_interval: 1
  vst_pass_through_mode: false
  chunk_size: 1

# WebSocket Configuration - Disabled for tests
websocket:
  enabled: false
  consumer_group_prefix: "websocket_instance"
  redis_consumer:
    block_time: 1000
    count: 1
    reconnect_delay: 5

# Elastic Configuration - Points to Elastic simulator
elastic:
  enabled: true
  hosts:
    - http://127.0.0.1:9200
  index_name: "mdx-vlm-incidents"

# VLM Enhanced Sink Configuration
vlm_enhanced_sink:
  incident:
    type: "elastic"
    elastic:
      index: "mdx-vlm-incidents"
  alert:
    type: "elastic"
    elastic:
      index: "mdx-vlm-alerts"

# Logging Configuration
logging:
  level: "DEBUG"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  third_party_level: "WARNING"
