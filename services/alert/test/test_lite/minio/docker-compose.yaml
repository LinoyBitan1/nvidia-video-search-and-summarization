# MinIO Docker Compose for Alert Bridge Testing
# Usage: docker compose -f docker-compose-minio.yaml up -d

version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: alert-bridge-minio
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - alert-bridge-net

  # Optional: Create default bucket on startup
  minio-setup:
    image: minio/mc:latest
    container_name: alert-bridge-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing myminio/alert-media;
      mc anonymous set download myminio/alert-media;
      echo 'MinIO setup complete - bucket alert-media created with public read access';
      exit 0;
      "
    networks:
      - alert-bridge-net

volumes:
  minio_data:

networks:
  alert-bridge-net:
    driver: bridge
